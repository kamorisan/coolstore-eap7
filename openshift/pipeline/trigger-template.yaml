apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: coolstore-eap8-template
spec:
  params:
    - name: git-url
      description: Git repository URL
    - name: git-revision
      description: Git revision
      default: main
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: coolstore-eap8-run-
      spec:
        pipelineRef:
          name: coolstore-eap8-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: image-name
            value: image-registry.openshift-image-registry.svc:5000/user01-dev/coolstore-eap8:latest
          - name: namespace
            value: user01-dev
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
