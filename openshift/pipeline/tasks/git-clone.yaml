apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  params:
    - name: url
      type: string
      description: Git repository URL
    - name: revision
      type: string
      description: Git revision (branch, tag, commit)
      default: main
  workspaces:
    - name: output
      description: The git repository will be cloned here
  steps:
    - name: clone
      image: alpine/git:latest
      workingDir: /workspace
      env:
        - name: GIT_USERNAME
          valueFrom:
            secretKeyRef:
              name: gitea-git-secret
              key: username
        - name: GIT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitea-git-secret
              key: password
      script: |
        #!/bin/sh
        set -e

        CHECKOUT_DIR="$(workspaces.output.path)"

        echo "Cloning $(params.url) branch $(params.revision) to ${CHECKOUT_DIR}"

        # Clean existing files (not the directory itself)
        rm -rf "${CHECKOUT_DIR}"/* "${CHECKOUT_DIR}"/.[!.]* 2>/dev/null || true

        # Configure git credential helper for HTTPS
        git config --global credential.helper store
        echo "https://${GIT_USERNAME}:${GIT_PASSWORD}@gitea-gitea.apps.cluster-jxznt.jxznt.sandbox3409.opentlc.com" > ~/.git-credentials

        git clone --depth 1 --branch "$(params.revision)" "$(params.url)" "${CHECKOUT_DIR}"

        # Clean credentials
        rm -f ~/.git-credentials

        cd "${CHECKOUT_DIR}"
        echo ""
        echo "Repository cloned successfully:"
        ls -la
        echo ""
        git log -1 --oneline
