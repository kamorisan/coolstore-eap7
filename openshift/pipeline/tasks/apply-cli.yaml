apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apply-cli
spec:
  workspaces:
    - name: source
      description: Workspace containing the source code
  steps:
    - name: apply-configuration
      image: image-registry.openshift-image-registry.svc:5000/workshop-images/eap81-runtime:8.1
      workingDir: $(workspaces.source.path)
      env:
        - name: JBOSS_HOME
          value: /workspace/source/target/server
      script: |
        #!/bin/bash
        set -e

        echo "======================================"
        echo "Applying CLI Scripts to Provisioned Server"
        echo "======================================"

        SERVER_HOME="$(workspaces.source.path)/target/server"
        CLI="${SERVER_HOME}/bin/jboss-cli.sh"

        if [ ! -d "${SERVER_HOME}" ]; then
          echo "ERROR: ${SERVER_HOME} does not exist"
          ls -la "$(workspaces.source.path)/target/" || true
          exit 1
        fi

        echo "Server found at: ${SERVER_HOME}"
        echo ""

        echo "Starting EAP in admin-only mode..."
        cd "${SERVER_HOME}"
        ./bin/standalone.sh --admin-only &
        EAP_PID=$!

        # Wait for EAP to start
        echo "Waiting for EAP to be ready..."
        for i in {1..60}; do
          if ${CLI} --connect --command=":read-attribute(name=server-state)" 2>/dev/null | grep -q "running"; then
            echo "✓ EAP is ready"
            break
          fi
          echo "Waiting... ($i/60)"
          sleep 3
        done

        # Apply Datasource CLI
        echo ""
        echo "Applying datasource.cli..."
        ${CLI} --connect --file="$(workspaces.source.path)/s2i/eap8-install/configuration/datasource.cli"

        # Apply Messaging CLI (check if messaging-activemq subsystem exists)
        echo ""
        echo "Checking messaging-activemq subsystem..."
        set +e
        MSG_CHECK=$(${CLI} --connect --command="/subsystem=messaging-activemq:read-resource" 2>&1)
        set -e

        if echo "${MSG_CHECK}" | grep -q '"outcome" => "success"'; then
          echo "messaging-activemq subsystem found, applying messaging.cli..."
          ${CLI} --connect --file="$(workspaces.source.path)/s2i/eap8-install/configuration/messaging.cli"
        else
          echo "⚠ messaging-activemq subsystem not found, skipping messaging.cli"
          echo "   This is expected if messaging-activemq layer was not included in Galleon provisioning"
        fi

        # Shutdown EAP
        echo ""
        echo "Shutting down EAP..."
        ${CLI} --connect --command=":shutdown"
        wait ${EAP_PID}

        # Remove build-time configuration history to prevent runtime errors
        # EAP recreates this directory at runtime
        HISTORY_DIR="${SERVER_HOME}/standalone/configuration/standalone_xml_history"

        if [ -d "${HISTORY_DIR}" ]; then
            echo ""
            echo "Removing build-time configuration history..."
            rm -rf "${HISTORY_DIR}"
            echo "✓ Configuration history removed"
        fi

        echo ""
        echo "======================================"
        echo "✓ CLI Scripts Applied Successfully"
        echo "======================================"
