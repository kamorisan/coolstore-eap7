apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy
spec:
  params:
    - name: NAMESPACE
      type: string
      description: Target namespace
      default: user01-dev
  workspaces:
    - name: source
      description: Workspace containing manifests
  steps:
    - name: apply-manifests
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e

        echo "======================================"
        echo "Deploying to OpenShift"
        echo "Namespace: $(params.NAMESPACE)"
        echo "======================================"

        oc project $(params.NAMESPACE)

        echo ""
        echo "Applying Deployment, Service, Route..."
        oc apply -f openshift/deployment.yaml

        echo ""
        echo "Restarting Deployment to use the newly pushed image..."
        oc rollout restart deployment/coolstore-eap8

        echo ""
        echo "Waiting for rollout..."
        oc rollout status deployment/coolstore-eap8 --timeout=300s

        echo ""
        echo "Getting Route URL..."
        ROUTE_URL=$(oc get route coolstore-eap8 -o jsonpath='https://{.spec.host}/')

        echo ""
        echo "======================================"
        echo "✓ Deployment Complete"
        echo "Application URL: ${ROUTE_URL}"
        echo "======================================"
