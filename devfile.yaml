schemaVersion: 2.3.0
metadata:
  name: coolstore-modernization-workshop
  displayName: Coolstore Modernization Workshop
  description: Workshop environment for modernizing EAP7 application with Red Hat Developer Lightspeed
  language: java
  projectType: maven
  tags:
    - Java
    - EAP
    - Migration
    - Modernization
  version: 1.0.0

projects:
  - name: coolstore-eap7
    git:
      remotes:
        origin: https://github.com/kamorisan/coolstore-eap7
      checkoutFrom:
        revision: main

components:
  - name: dev-tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:latest
      memoryRequest: 2Gi
      memoryLimit: 8Gi
      cpuRequest: 500m
      cpuLimit: 2000m
      mountSources: true
      sourceMapping: /projects
      volumeMounts:
        - name: m2
          path: /home/user/.m2
      env:
        - name: JAVA_HOME
          value: /usr/lib/jvm/java-21-openjdk
        - name: PATH
          value: /usr/lib/jvm/java-21-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: MAVEN_OPTS
          value: "-Xmx2g"

  - name: m2
    volume:
      size: 10Gi

commands:
  - id: oc-auto-login
    exec:
      component: dev-tools
      commandLine: |
        #!/bin/bash
        USERNAME=$(echo "${DEVWORKSPACE_NAMESPACE}" | sed 's/-dev$//')
        OCP_API=$(oc whoami --show-server 2>/dev/null || echo "https://kubernetes.default.svc")

        if oc login --insecure-skip-tls-verify=true "$OCP_API" -u "$USERNAME" -p "openshift" >/dev/null 2>&1; then
          echo "✅ Logged in as $USERNAME"
        else
          echo "⚠️ Auto-login skipped"
        fi
        exit 0
      workingDir: ${PROJECT_SOURCE}
      label: "Auto-login to OpenShift"
      group:
        kind: run
        isDefault: false

  - id: setup-mta-config
    exec:
      component: dev-tools
      commandLine: |
        SETTINGS_DIR="/checode/remote/data/User/globalStorage/redhat.mta-core/settings"
        SOURCE_FILE="/projects/coolstore-eap7/.devspaces/provider-settings.yaml"
        TARGET_FILE="$SETTINGS_DIR/provider-settings.yaml"
        echo "Setting up MTA configuration..."
        MAX_WAIT=60
        WAITED=0
        while [ ! -d "/projects/coolstore-eap7" ] && [ $WAITED -lt $MAX_WAIT ]; do
          echo "Waiting for coolstore-eap7 project... ($WAITED/$MAX_WAIT)"
          sleep 5
          WAITED=$((WAITED + 5))
        done
        mkdir -p "$SETTINGS_DIR"
        if [ -f "$SOURCE_FILE" ]; then
          cp -f "$SOURCE_FILE" "$TARGET_FILE"
          chmod 644 "$TARGET_FILE"
          echo "MTA provider settings configured successfully"
          echo "Source: $SOURCE_FILE"
          echo "Target: $TARGET_FILE"
          ls -la "$SETTINGS_DIR/"
        else
          echo "Warning: Source file not found: $SOURCE_FILE"
          echo "Please ensure .devspaces/provider-settings.yaml exists in coolstore-eap7 repository"
        fi
        exit 0
      workingDir: /projects
      label: "Setup MTA Configuration"
      group:
        kind: run
        isDefault: false

  - id: maven-build
    exec:
      component: dev-tools
      commandLine: mvn clean package -DskipTests
      workingDir: ${PROJECT_SOURCE}/coolstore-eap7
      label: "Build"
      group:
        kind: build
        isDefault: false

  - id: maven-test
    exec:
      component: dev-tools
      commandLine: mvn test
      workingDir: ${PROJECT_SOURCE}/coolstore-eap7
      label: "Test"
      group:
        kind: test

  - id: run-app
    exec:
      component: dev-tools
      commandLine: mvn spring-boot:run
      workingDir: ${PROJECT_SOURCE}/coolstore-eap7
      label: "Run Application"
      group:
        kind: run
        isDefault: false

events:
  postStart:
    - setup-mta-config
